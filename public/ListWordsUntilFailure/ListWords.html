<!DOCTYPE html>
<head>
    <link rel="stylesheet" type="text/css" href="ListWords.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu&display=swap" rel="stylesheet">
</head>

<body>
    <div class="box">
        <h2>List Words Until Failure</h2>
        <h5>Type as many different words as you can within the time limit. Timer starts when the first word is entered. You gain 6 seconds for every word typed.</h5>
        <br>
        <p id="timer">Time Left: <span id="time">60</span> seconds</p>
        <input id="inputField" type="text"><br>
        <button type="button" onclick="checkWord()">Button</button>
        <br>
        <p>Score: <span id="pointCountSpan">0</span></p>
        <p>Words Entered:</p>
        <p id="listOfWords"></p>
    </div>
    <script src="game.js" type="text/javascript"></script>
</body>
